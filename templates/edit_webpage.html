<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit</title>
</head>
<body>
    <h1>Edit Rating</h1>

    <p>Book Name = {{ book.title }}</p>
    <p>Current Rating = {{ book.rating }}</p>

    <form method="POST" action="{{ url_for('edit_rating', book_id=book.id) }}">
        <input type="number" name="rating" min="0" max="10" step="0.1" value="{{ book.rating }}" placeholder="New Rating">
        <button type="submit">Change Rating</button>
    </form>
</body>
</html>
